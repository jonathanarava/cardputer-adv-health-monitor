; =====================================================================
; Cardputer ADV (Stamp-S3A / ESP32-S3FN8) - sensor + GPIO dev console
; Pinmap source: https://docs.m5stack.com/en/core/Cardputer-Adv
; =====================================================================
[env:cardputer_adv]
platform  = espressif32
board     = esp32-s3-devkitc-1      ; matches M5's own PlatformIO template for this board
framework = arduino

; ===========================
; Flash (Stamp-S3A = ESP32-S3FN8, 8MB flash, no PSRAM)
; ===========================
board_upload.flash_size = 8MB
board_build.partitions  = default_8MB.csv

; ===========================
; Serial Monitor
; ===========================
monitor_speed = 115200
monitor_echo  = yes
monitor_filters =
    send_on_enter
    colorize
    esp32_exception_decoder

; ===========================
; Upload
; ===========================
upload_speed = 921600

; ===========================
; USB CDC (needed - Stamp-S3A has no separate USB-UART chip)
; ===========================
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0

; ===========================
; Libraries
; ===========================
lib_deps =
    adafruit/Adafruit BusIO
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit SHT31 Library
    adafruit/Adafruit BMP280 Library
    adafruit/Adafruit BME280 Library
    claws/BH1750
    adafruit/Adafruit MPU6050
    pololu/VL53L0X
    sparkfun/SparkFun BMI270 Arduino Library   ; onboard IMU